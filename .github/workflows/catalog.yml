name: Catalog

on:
  pull_request:
  push:

jobs:
  validate-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Rebuild catalog
        run: python scripts/generate_catalog.py

      - name: Verify generated metadata is committed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Catalog metadata is out of date. Run 'python3 scripts/generate_catalog.py' and commit the results."
            git --no-pager status --short
            exit 1
          fi
